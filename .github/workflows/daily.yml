name: daily-report
on:
  schedule:
    - cron: "0 1 * * *"   # 08:00 Asia/Bangkok
  workflow_dispatch:

concurrency:
  group: goldeye
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Send daily report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
        run: python daily.py
      - name: Commit state updates
        if: always()
        run: |
          git config user.name "goldeye-bot"
          git config user.email "goldeye-bot@users.noreply.github.com"
          git pull --rebase --autostash
          git add data
          git diff --cached --quiet || { git commit -m "log: daily report"; git push; }
