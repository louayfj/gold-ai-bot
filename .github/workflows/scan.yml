name: scan
on:
  workflow_dispatch:  # cron disabled — Fly.io scheduler handles this now

# never let two scans run at once: they would race on data/ commits
concurrency:
  group: goldeye
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
        run: python scan.py
      - name: Commit log updates
        if: always()
        run: |
          git config user.name "goldeye-bot"
          git config user.email "goldeye-bot@users.noreply.github.com"
          git pull --rebase --autostash
          git add data
          git diff --cached --quiet || { git commit -m "log: scan $(date -u +%FT%TZ)"; git push; }
